name: CI

# Run on PRs and on pushes to main (post-merge), the usual flow.
on:
  push:
    branches: [main]
  pull_request:

# A new push to a branch/PR cancels the in-flight run for it, so we never
# burn minutes on superseded commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      # https://github.com/actions/checkout
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # https://github.com/pnpm/action-setup — version comes from packageManager in package.json
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      # https://github.com/actions/setup-node
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  e2e:
    name: Build & E2E
    runs-on: ubuntu-latest
    steps:
      # https://github.com/actions/checkout
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # https://github.com/pnpm/action-setup — version comes from packageManager in package.json
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      # https://github.com/actions/setup-node
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Explicit production build — verifies the build works and reports a build
      # failure distinctly from a test failure. Playwright then serves this
      # output (playwright.config.ts runs `pnpm start` only when CI is set).
      # MOCK=1 so the statically prerendered `/` uses the deterministic fixtures
      # the E2E specs assert against (the server is started with MOCK=1 too).
      - name: Build
        run: pnpm build
        env:
          MOCK: "1"
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E tests
        run: pnpm test:e2e
      # Keep the report only when E2E fails, so runs stay debuggable without
      # storing an artifact on every green build.
      - if: ${{ failure() }}
        # https://github.com/actions/upload-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
